<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="htmx-config" content='{"selfRequestsOnly":false}' />
    <title>RaceMate</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.jsdelivr.net/gh/ChristianPavilonis/tauri-htmx-extension@latest/dist/tauri-htmx-extension.js"></script>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <header>
      <span class="logo-text">RaceMate</span>
    </header>

    <main>
      <section class="card">
        <h2>Recorder</h2>
        <div
          id="status"
          hx-post="command:get_recorder_status"
          hx-trigger="load, every 2s"
          hx-swap="innerHTML"
        >
          <div class="status status--offline">
            <span class="dot"></span>
            <span>Connecting...</span>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
